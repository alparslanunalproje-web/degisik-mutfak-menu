<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Değişik Mutfak | Yönetim Paneli & QR Jeneratör</title>
    <!-- Google fonts are imported in style.css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, hsl(200, 40%, 95%) 0%, hsl(210, 40%, 90%) 100%);">

    <div class="admin-container">
        
        <!-- Header -->
        <header class="admin-header">
            <div class="admin-title-wrap">
                <a href="index.html" class="back-to-menu">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Menü Görünümüne Git
                </a>
                <h1 style="font-size: 28px; font-weight: 800; color: var(--text-dark);">Yönetim Paneli</h1>
                <p style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">Karekod menünüzü yönetin, QR kodunuzu özelleştirip indirin ve menü ürünlerini ekleyin.</p>
            </div>
            <div>
                <button id="btn-reset-defaults" class="btn btn-secondary" style="font-size: 12px; padding: 8px 14px;">⚙️ Menüyü Sıfırla</button>
            </div>
        </header>

        <!-- Admin Content Grid -->
        <div class="admin-grid">
            
            <!-- Left Column: QR Generator & Customizer -->
            <div class="admin-panel-card">
                <h2 class="admin-panel-title">
                    <span style="font-size: 20px;">📱</span> Karekod Oluşturucu
                </h2>
                
                <!-- QR Preview Box -->
                <div class="qr-preview-container">
                    <div id="qrcode-box"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="qr-url">Karekod Bağlantı Adresi (URL)</label>
                    <input type="url" id="qr-url" class="form-input" placeholder="https://example.com/menu">
                    <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">QR kod taratıldığında bu web adresine yönlendirecektir.</p>
                </div>

                <!-- Customization Options -->
                <div class="qr-customizer">
                    <div class="color-pickers">
                        <div class="form-group">
                            <label class="form-label">Karekod Rengi</label>
                            <div class="color-picker-box">
                                <input type="color" id="qr-color-dark" value="#0284c7">
                                <span style="font-size: 12px;" id="qr-color-dark-lbl">#0284c7</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Arka Plan Rengi</label>
                            <div class="color-picker-box">
                                <input type="color" id="qr-color-light" value="#ffffff">
                                <span style="font-size: 12px;" id="qr-color-light-lbl">#ffffff</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Button to Download -->
                <button id="btn-download-qr" class="btn btn-primary btn-block">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Karekodu PNG Olarak İndir
                </button>
            </div>

            <!-- Right Column: Menu Item CRUD / Forms -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                
                <!-- Add/Edit Form Card -->
                <div class="admin-panel-card">
                    <h2 class="admin-panel-title" id="form-card-title">
                        <span style="font-size: 20px;">🥗</span> Yeni Ürün Ekle
                    </h2>
                    
                    <form id="menu-item-form">
                        <input type="hidden" id="edit-item-id">
                        
                        <div class="form-group">
                            <label class="form-label" for="item-name">Ürün Adı</label>
                            <input type="text" id="item-name" class="form-input" required placeholder="Örn. Akdeniz Bahçesi Salatası">
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label class="form-label" for="item-price">Fiyat (TL)</label>
                                <input type="number" id="item-price" class="form-input" min="0" required placeholder="Örn. 180">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="item-category">Kategori</label>
                                <select id="item-category" class="form-select" required>
                                    <option value="starters">Sıra Dışı Girişler</option>
                                    <option value="mains">Sınırları Zorlayanlar</option>
                                    <option value="desserts">Tatlı Kaçamaklar</option>
                                    <option value="drinks">Sıra Dışı Yudumlar</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="item-desc">Açıklama</label>
                            <textarea id="item-desc" class="form-textarea" rows="3" required placeholder="İçerik, pişirilme tarzı veya lezzet notları..."></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="item-image">Görsel URL veya assets/dosya-adı.png</label>
                            <input type="text" id="item-image" class="form-input" placeholder="Görsel linki veya local path (boş bırakılırsa varsayılan görsel atanır)">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Diyet Etiketleri</label>
                            <div class="checkbox-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="tag-chef" value="chef"> ⭐ Spesiyal
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="tag-veggie" value="veggie"> 🌱 Vejetaryen
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="tag-vegan" value="vegan"> 🍀 Vegan
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" id="tag-spicy" value="spicy"> 🌶️ Acılı
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="item-allergens">Alerjenler (Virgülle ayırarak yazın)</label>
                            <input type="text" id="item-allergens" class="form-input" placeholder="Örn. Gluten, Süt Ürünü, Kuruyemiş (yoksa boş bırakın)">
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 24px;">
                            <button type="submit" id="btn-submit-form" class="btn btn-primary" style="flex-grow: 1;">Ürünü Menüye Ekle</button>
                            <button type="button" id="btn-cancel-edit" class="btn btn-secondary" style="display: none;">İptal</button>
                        </div>
                    </form>
                </div>

                <!-- Existing Items List Card -->
                <div class="admin-panel-card">
                    <h2 class="admin-panel-title">
                        <span style="font-size: 20px;">📜</span> Mevcut Menü Ürünleri (<span id="items-count">0</span>)
                    </h2>
                    
                    <div class="admin-items-list" id="admin-items-list">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Scripts -->
    <script src="js/qrcode.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
